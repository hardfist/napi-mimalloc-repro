name: repro

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  probe:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - macos-15
          - ubuntu-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      - name: Probe copied native addon
        shell: bash
        run: |
          npm run probe | tee probe-summary.md
          cat probe-summary.md >> "$GITHUB_STEP_SUMMARY"
